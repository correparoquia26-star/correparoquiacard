<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Corre Paróquia 2026 - Gerador de Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        input[type="range"] { accent-color: #10b981; }
    </style>
</head>
<body class="min-h-screen bg-zinc-950 text-white flex flex-col items-center justify-center p-4 antialiased">

    <div class="max-w-md w-full text-center space-y-6">
        <header class="space-y-1">
            <h1 class="text-2xl font-extrabold tracking-tight text-zinc-100">Gere seu Card Oficial</h1>
            <p class="text-zinc-400 text-xs">Ajuste sua foto antes de baixar o card dos Stories</p>
        </header>

        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-2xl space-y-5">
            
            <div id="card-evento" class="relative w-full aspect-[9/16] rounded-xl overflow-hidden shadow-lg border border-zinc-800 bg-black select-none">
                
                <div id="moldura-bg" class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" style="background-image: url('fundo.png');"></div>
                
                <div id="wrapper-foto" class="absolute top-[36.5%] left-1/2 -translate-x-1/2 w-[64%] h-[41%] z-10 overflow-hidden bg-transparent flex items-center justify-center">
                    
                    <img id="user-foto-bg" src="" alt="" class="hidden absolute w-full h-full object-cover filter blur-lg opacity-60 pointer-events-none z-0 origin-center transition-none" />
                    
                    <img id="user-foto" src="" alt="" class="hidden max-w-full max-h-full object-contain origin-center pointer-events-none transition-none z-10" />
                    
                    <div id="foto-placeholder" class="absolute z-20 flex flex-col items-center justify-center text-zinc-400 bg-black/60 p-4 rounded-xl space-y-2 px-4 backdrop-blur-sm">
                        <svg xmlns="http://www.w3.org/2000/xl" class="h-10 w-10 stroke-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span class="text-xs font-medium">Nenhuma foto selecionada</span>
                    </div>
                </div>

            </div>

            <div class="space-y-4 text-left border-t border-zinc-800 pt-4">
                
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">1. Escolha sua foto de corredor</label>
                    <input type="file" id="input-foto" accept="image/*" class="w-full text-xs text-zinc-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 file:cursor-pointer" />
                </div>

                <div id="painel-ajustes" class="opacity-40 pointer-events-none transition-all duration-300 space-y-3 bg-zinc-950/50 p-3 rounded-xl border border-zinc-800">
                    <p class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">2. Ajuste a posição da sua foto sobre o fundo</p>
                    <div class="flex items-center space-x-3">
                        <span class="text-xs text-zinc-500 w-16">Zoom:</span>
                        <input type="range" id="slider-zoom" min="100" max="250" value="100" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-xs text-zinc-500 w-16">Lado/Lado:</span>
                        <input type="range" id="slider-x" min="-150" max="150" value="0" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-xs text-zinc-500 w-16">Cima/Baixo:</span>
                        <input type="range" id="slider-y" min="-150" max="150" value="0" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <button id="btn-download" class="w-full bg-emerald-500 hover:bg-emerald-600 text-zinc-950 font-bold py-3.5 px-4 rounded-xl text-sm transition flex items-center justify-center space-x-2 active:scale-[0.98]">
                    <span>Salvar Card no Telefone</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const inputFoto = document.getElementById('input-foto');
        const userFoto = document.getElementById('user-foto');
        const userFotoBg = document.getElementById('user-foto-bg');
        const wrapperFoto = document.getElementById('wrapper-foto');
        const cardEvento = document.getElementById('card-evento');
        const btnDownload = document.getElementById('btn-download');
        const painelAjustes = document.getElementById('painel-ajustes');

        const sliderZoom = document.getElementById('slider-zoom');
        const sliderX = document.getElementById('slider-x');
        const sliderY = document.getElementById('slider-y');

        let scale = 1.0; let translateX = 0; let translateY = 0;

        function aplicarTransformacoes() {
            if (!userFoto.complete || userFoto.src === "") return;

            const containerW = wrapperFoto.clientWidth;
            const containerH = wrapperFoto.clientHeight;

            // Define o limite dinâmico para os controles deslizantes
            const rangeX = Math.round(containerW * scale * 0.6);
            const rangeY = Math.round(containerH * scale * 0.6);

            sliderX.min = -rangeX;
            sliderX.max = rangeX;
            sliderY.min = -rangeY;
            sliderY.max = rangeY;

            // Aplica as transformações na foto nítida frontal
            userFoto.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;

            // Sincroniza a camada borrada de fundo: ela se move na mesma direção e ganha um multiplicador de tamanho extra (1.4x) para garantir que cobrirá todo e qualquer espaço preto nas bordas
            const bgScale = scale * 1.4;
            userFotoBg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${bgScale})`;
        }

        inputFoto.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    userFoto.src = event.target.result;
                    userFotoBg.src = event.target.result;
                    
                    userFoto.classList.remove('hidden');
                    userFotoBg.classList.remove('hidden');
                    
                    document.getElementById('foto-placeholder').style.display = 'none';
                    painelAjustes.classList.remove('opacity-40', 'pointer-events-none');
                    
                    scale = 1.0; translateX = 0; translateY = 0;
                    sliderZoom.value = 100; sliderX.value = 0; sliderY.value = 0;
                    
                    userFoto.onload = function() {
                        aplicarTransformacoes();
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        sliderZoom.addEventListener('input', (e) => { scale = e.target.value / 100; aplicarTransformacoes(); });
        sliderX.addEventListener('input', (e) => { translateX = parseFloat(e.target.value); aplicarTransformacoes(); });
        sliderY.addEventListener('input', (e) => { translateY = parseFloat(e.target.value); aplicarTransformacoes(); });

        btnDownload.addEventListener('click', () => {
            if(userFoto.src === "" || userFoto.classList.contains('hidden')) {
                alert("Por favor, selecione uma foto primeiro!");
                return;
            }
            btnDownload.innerText = "Processando Imagem...";

            const imgFundoOriginal = new Image();
            imgFundoOriginal.src = 'fundo.png';
            
            imgFundoOriginal.onload = function() {
                const larguraOriginal = imgFundoOriginal.naturalWidth || 1080;
                const larguraAtualCSS = cardEvento.clientWidth;
                const escalaNativa = larguraOriginal / larguraAtualCSS;

                html2canvas(cardEvento, {
                    useCORS: true,
                    scale: escalaNativa,
                    logging: false,
                    backgroundColor: null
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'card-oficial.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    btnDownload.innerText = "Salvar Card no Telefone";
                }).catch(err => {
                    alert("Erro ao gerar imagem.");
                    btnDownload.innerText = "Salvar Card no Telefone";
                });
            };

            imgFundoOriginal.onerror = function() {
                html2canvas(cardEvento, { useCORS: true, scale: 3, logging: false }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'card-oficial.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    btnDownload.innerText = "Salvar Card no Telefone";
                });
            };
        });
    </script>
</body>
</html>
