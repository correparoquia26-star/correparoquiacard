<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Corre Paróquia 2026 - Pires Ferreira - CE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-md w-full bg-white p-6 rounded-2xl shadow-xl space-y-6">
        <h1 class="text-2xl font-bold text-center text-blue-900">#EUVOU Generator</h1>
        
        <div id="cardArea" class="relative w-full aspect-square bg-[#0c2461] rounded-xl overflow-hidden shadow-inner border border-gray-200">
            <img src="https://lovable.dev/api/v1/projects/0b329d47-c483-4813-8c19-e088bf8e0a8c/assets/medalha_vazada.png" class="absolute inset-0 w-full h-full object-cover z-10" alt="Fundo">

            <div class="absolute inset-0 flex items-center justify-center z-20">
                <img id="userPhotoPreview" src="" class="hidden w-[60%] h-[60%] object-cover rounded-full border-4 border-yellow-500 shadow-xl" alt="Foto">
            </div>

            </div>

        <div class="space-y-4">
            <label class="block text-sm font-medium text-gray-700">Adicione sua Foto:</label>
            <input type="file" id="photoInput" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            
            <button id="downloadBtn" class="w-full bg-blue-900 text-white font-bold py-3 px-6 rounded-full hover:bg-blue-800 transition duration-300">
                Baixar meu Card
            </button>
        </div>
    </div>

    <script>
        const photoInput = document.getElementById('photoInput');
        const userPhotoPreview = document.getElementById('userPhotoPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const cardArea = document.getElementById('cardArea');

        photoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userPhotoPreview.src = e.target.result;
                    userPhotoPreview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        downloadBtn.addEventListener('click', function() {
            if (userPhotoPreview.src === "") {
                alert("Por favor, adicione uma foto primeiro.");
                return;
            }
            html2canvas(cardArea, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'corre-paroquia-2026-euvou.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        });
    </script>
</body>
</html>
